<!DOCTYPE html>
<html lang="ja">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFYD72JSBG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KFYD72JSBG');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>プリスキンのサカつくDB - スキル検索</title>
    <style>
        :root {
            /* サカつく公式カラー抽出 */
            --sakatsuku-navy: #050a14;
            --sakatsuku-mint: #00ffcc;
            --sakatsuku-cyan: #4fc3f7;
            --sakatsuku-dark-green: #0a1f1a;
            
            --primary: var(--sakatsuku-mint);
            --dark: var(--sakatsuku-navy);
            --page-bg: radial-gradient(circle at 50% -20%, #1a3a35 0%, #050a14 70%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --nav-height: 60px;
            --border: rgba(0, 255, 204, 0.2);

            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --green: #2ecc71;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--sakatsuku-navy);
            background-image: var(--page-bg);
            background-attachment: fixed;
            font-family: 'Inter', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            color: #fff; line-height: 1.6;
        }

        /* ===== ナビゲーション ===== */
        .topnav {
            display: flex; justify-content: flex-start; align-items: center;
            background: rgba(5, 10, 20, 0.85); backdrop-filter: blur(15px);
            height: var(--nav-height); padding: 0 15px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--sakatsuku-mint); padding-top: env(safe-area-inset-top);
        }
        .nav-links { display: flex; overflow-x: auto; white-space: nowrap; gap: 6px; width: 100%; }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links a {
            color: rgba(255, 255, 255, 0.7); text-decoration: none; padding: 8px 14px; 
            font-size: 0.85rem; font-weight: 800; border-radius: 8px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--sakatsuku-mint); }
        .nav-links a.current { background: var(--sakatsuku-mint); color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }

        .assign-banner { 
            background: rgba(0, 255, 204, 0.2); 
            color: var(--sakatsuku-mint); 
            padding: 12px; text-align: center; font-size: 0.9rem; font-weight: 900; 
            border-bottom: 2px solid var(--sakatsuku-mint); 
            backdrop-filter: blur(10px);
            position: sticky; top: var(--nav-height); z-index: 999; 
        }

        /* ===== レイアウト ===== */
        .container { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 120px); }

        /* ===== サイドバー ===== */
        .sidebar { 
            width: 320px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 20px; border-right: 1px solid var(--border); 
            overflow-y: auto; height: calc(100vh - 60px); position: sticky; top: 60px; 
        }
        .sidebar h3 { font-size: 1.1rem; margin-top: 0; color: var(--sakatsuku-mint); border-left: 4px solid var(--sakatsuku-mint); padding-left: 10px; margin-bottom: 20px; }

        #nameSearch { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; 
            margin-bottom: 20px; font-size: 0.9rem; background: rgba(255,255,255,0.1); color: #fff; outline: none;
        }
        #nameSearch::placeholder { color: rgba(255,255,255,0.4); }

        .filter-section { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: rgba(255,255,255,0.03); }
        .filter-title { font-size: 0.85rem; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; color: var(--sakatsuku-cyan); }
        .filter-options { display: none; padding: 10px; max-height: 450px; overflow-y: auto; }

        .filter-btn { padding: 6px 10px; margin: 2px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; font-size: 0.75rem; border-radius: 6px; transition: 0.2s; }
        .filter-btn.active { background: var(--sakatsuku-mint); color: #000; border-color: var(--sakatsuku-mint); font-weight: bold; }
        .cat-group-label { display: block; font-size: 0.7rem; color: var(--sakatsuku-mint); font-weight: bold; margin: 12px 0 6px 4px; border-bottom: 1px solid var(--border); padding-bottom: 2px; }

        /* ===== メインコンテンツ ===== */
        .main { flex: 1; padding: 20px; }
        .main h1 { font-size: 1.8rem; margin-top: 0; color: #fff; text-shadow: 0 0 15px rgba(0,255,204,0.3); font-weight: 900; }

        .skill-item { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border-left: 6px solid var(--sakatsuku-mint); padding: 16px; 
            margin-bottom: 12px; border-radius: 12px; display: flex; 
            justify-content: space-between; align-items: center; 
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .skill-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        
        .skill-info { flex: 1; padding-right: 15px; }
        .skill-cat-small { font-size: 0.75rem; color: var(--sakatsuku-cyan); font-weight: bold; }
        .skill-name { font-weight: 900; font-size: 1.15rem; margin: 4px 0; color: #fff; cursor: pointer; }
        .skill-name:hover { color: var(--sakatsuku-mint); }
        .source-info-simple { font-size: 0.8rem; color: #ccc; margin-top: 4px; }
        .method-badge { 
            display: inline-block; padding: 2px 8px; border-radius: 4px; 
            background: rgba(0, 255, 204, 0.1); color: var(--sakatsuku-mint); font-size: 0.7rem; 
            font-weight: 800; margin-right: 8px; border: 1px solid var(--border);
        }

        .rarity-金 { color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); } 
        .rarity-銀 { color: var(--silver); } 
        .rarity-銅 { color: var(--bronze); } 
        .rarity-緑 { color: var(--green); }

        .btn-group { display: flex; flex-direction: column; gap: 6px; min-width: 120px; }
        .action-btn { padding: 8px 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-size: 0.75rem; font-weight: 900; background: rgba(255,255,255,0.05); color: #fff; transition: 0.2s; }
        .action-btn:hover { border-color: var(--sakatsuku-mint); }
        .action-btn.is-owned { background: #fef3c7; border-color: #fbbf24; color: #92400e; }
        .action-btn.detail-btn { background: var(--sakatsuku-mint); color: #000; border: none; }
        .action-btn.assign-btn { background: var(--sakatsuku-cyan); color: #000; border: none; }

        .owned-badge { background: #fbbf24; color: #000; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 8px; }

        /* ===== モーダル ===== */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--sakatsuku-navy); border: 2px solid var(--sakatsuku-mint); width: 100%; max-width: 450px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        .modal-header { background: #1a3a35; color: var(--sakatsuku-mint); padding: 20px; text-align: center; }
        .modal-header h2 { margin: 0; font-size: 1.3rem; font-weight: 900; }
        .modal-body { padding: 20px; }
        .modal-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-label { font-weight: bold; color: var(--sakatsuku-cyan); font-size: 0.85rem; }
        .modal-val { font-weight: 600; color: #fff; text-align: right; }
        .modal-detail-box { margin-top: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.9rem; line-height: 1.6; color: #eee; }
        .close-btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* ===== フッター ===== */
        footer { text-align: center; padding: 60px 20px; background: rgba(5, 10, 20, 0.95); color: #777; border-top: 1px solid var(--border); margin-top: 40px; }
        .footer-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; font-size: 0.85rem; margin-bottom: 25px; }
        .footer-nav a { color: var(--sakatsuku-cyan); text-decoration: none; font-weight: 700; }
        .footer-nav a.current-footer { color: #fff; text-decoration: underline; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 900px) { 
            .container { flex-direction: column; } 
            .sidebar { width: 100%; border-right: none; height: auto; position: relative; top: 0; }
            .skill-item { flex-direction: column; align-items: flex-start; }
            .btn-group { width: 100%; margin-top: 12px; flex-direction: row; flex-wrap: wrap; }
            .btn-group button { flex: 1; min-width: 80px; }
        }
    </style>
</head>
<body>

<header class="topnav">
    <nav class="nav-links">
        <a href="index.html">ホーム</a>
        <a href="builder.html">スカッド</a>
        <a href="search.html">選手</a>
        <a href="formation-search.html">フォメコン</a>
        <a href="skills.html" class="current">スキル</a>
    </nav>
</header>

<div id="assignBanner" class="assign-banner" style="display:none;">
    <span id="targetPlayerName"></span> のスキル枠 <span id="targetSlotNum"></span> を選択中
    <button class="action-btn" onclick="cancelAssign()" style="margin-left:15px; border-color: var(--sakatsuku-mint);">キャンセル</button>
</div>

<div class="container">
    <div class="sidebar">
        <h3>スキル絞り込み</h3>
        <input type="text" id="nameSearch" placeholder="スキル名・詳細で検索..." oninput="saveFilters(); renderSkills();">

        <div class="filter-section">
            <div class="filter-title">表示設定</div>
            <div style="padding:10px;">
                <button id="showAll" class="filter-btn active" onclick="toggleOwnedFilter('all')">全表示</button>
                <button id="showOwned" class="filter-btn" onclick="toggleOwnedFilter('owned')">所持のみ</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleSection('raritySection')">レアリティ <span>▼</span></div>
            <div id="raritySection" class="filter-options">
                <button class="filter-btn" data-type="rarity" data-value="金" onclick="toggleFilter('rarity','金')">金</button>
                <button class="filter-btn" data-type="rarity" data-value="銀" onclick="toggleFilter('rarity','銀')">銀</button>
                <button class="filter-btn" data-type="rarity" data-value="銅" onclick="toggleFilter('rarity','銅')">銅</button>
                <button class="filter-btn" data-type="rarity" data-value="緑" onclick="toggleFilter('rarity','緑')">緑</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleSection('typeSection')">カテゴリ <span>▼</span></div>
            <div id="typeSection" class="filter-options">
                <button class="filter-btn" data-type="type" data-value="シュート" onclick="toggleFilter('type','シュート')">シュート</button>
                <button class="filter-btn" data-type="type" data-value="ドリブル" onclick="toggleFilter('type','ドリブル')">ドリブル</button>
                <button class="filter-btn" data-type="type" data-value="パス" onclick="toggleFilter('type','パス')">パス</button>
                <button class="filter-btn" data-type="type" data-value="トラップ" onclick="toggleFilter('type','トラップ')">トラップ</button>
                <button class="filter-btn" data-type="type" data-value="コンタクト" onclick="toggleFilter('type','コンタクト')">コンタクト</button>
                <button class="filter-btn" data-type="type" data-value="タックル" onclick="toggleFilter('type','タックル')">タックル</button>
                <button class="filter-btn" data-type="type" data-value="パスカット" onclick="toggleFilter('type','パスカット')">パスカット</button>
                <button class="filter-btn" data-type="type" data-value="GKセーブ" onclick="toggleFilter('type','GKセーブ')">GKセーブ</button>
                <button class="filter-btn" data-type="type" data-value="GK飛び出し" onclick="toggleFilter('type','GK飛び出し')">GK飛び出し</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleSection('smallCatSection')">詳細種別 <span>▼</span></div>
            <div id="smallCatSection" class="filter-options">
                <div id="smallCatContainer"></div>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-title" onclick="toggleSection('methodSection')">習得方法 <span>▼</span></div>
            <div id="methodSection" class="filter-options">
                <button class="filter-btn" data-type="method" data-value="継承" onclick="toggleFilter('method','継承')">継承</button>
                <button class="filter-btn" data-type="method" data-value="期限付き移籍" onclick="toggleFilter('method','期限付き移籍')">期限付き</button>
                <button class="filter-btn" data-type="method" data-value="固有" onclick="toggleFilter('method','固有')">固有</button>
                <button class="filter-btn" data-type="method" data-value="SR" onclick="toggleFilter('method','SR')">SR選手</button>
                <button class="filter-btn" data-type="method" data-value="SSR" onclick="toggleFilter('method','SSR')">SSR選手</button>
            </div>
        </div>

        <button class="action-btn" style="width:100%; margin-top:10px; padding:12px; border-color: var(--sakatsuku-mint); color: var(--sakatsuku-mint);" onclick="resetFilters()">条件リセット</button>
    </div>

    <div class="main">
        <h1>スキルデータベース</h1>
        <div id="skillList">読み込み中...</div>
    </div>
</div>

<div id="skillDetailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2 id="modalSkillName">スキル名</h2></div>
        <div class="modal-body">
            <div class="modal-row"><span class="modal-label">レアリティ</span><span id="modalRarity" class="modal-val"></span></div>
            <div class="modal-row"><span class="modal-label">カテゴリ</span><span id="modalCategory" class="modal-val"></span></div>
            <div class="modal-row"><span class="modal-label">習得方法</span><span id="modalMethod" class="modal-val"></span></div>
            <div class="modal-row"><span class="modal-label">習得元</span><span id="modalSource" class="modal-val"></span></div>
            <div id="modalDetail" class="modal-detail-box"></div>
        </div>
        <div class="modal-footer" style="padding:15px;"><button class="close-btn" onclick="closeModal()">閉じる</button></div>
    </div>
</div>

<footer>
    <div class="footer-nav">
        <a href="index.html">ホーム</a>
        <a href="builder.html">スカッド</a>
        <a href="search.html">選手検索</a>
        <a href="formation-search.html">フォメコン</a>
        <a href="skills.html" class="current-footer">スキル検索</a>
    </div>
    <p class="copyright">&copy; 2026 プリスキンのサカつくDB</p>
</footer>

<script>
    let allSkills = [];
    let mySkills = JSON.parse(localStorage.getItem('mySkills')) || [];
    let filters = { rarity: [], type: [], smallCat: [], method: [] };
    let showMode = 'all';

    const categoryMap = {
        "シュート": ["ゴール前でのダイレクトシュート", "ゴール前でのシュート", "エリア外からのロングシュート", "ゴール前でのヘディングシュート", "直接ゴールを狙うFK"],
        "ドリブル": ["シュートにつなげるドリブル", "ショートパスを誘発するドリブル", "敵陣を切り裂くドリブル"],
        "パス": ["シュートを誘発するショートパス", "ロングシュートを誘発するパス", "シュートを誘発するクロス", "CFに当てる楔のパス", "CFからの落としのショートパス", "トラップを誘発するロングパス", "ボールを進めるショートパス", "ドリブルを誘発するパス", "後方からのショートパス", "ゴール前の味方に届けるFK"],
        "トラップ": ["ショートパスにつなげるトラップ", "ドリブルにつなげるトラップ"],
        "コンタクト": ["激しいコンタクト"],
        "タックル": ["ボールを奪いに行くタックル", "ドリブルにつなげるタックル"],
        "パスカット": ["チャンスの芽を摘むパスカット", "フィードにつなげるパスカット"],
        "GKセーブ": ["ゴールを死守するGKセーブ"],
        "GK飛び出し": ["冷静な飛び出し"]
    };

    const urlParams = new URLSearchParams(window.location.search);
    const targetPid = urlParams.get('pid');
    const targetSlot = urlParams.get('slot');
    const fromBuilder = urlParams.get('from') === 'builder';

    async function init() {
        if (targetPid && targetSlot !== null) {
            document.getElementById('assignBanner').style.display = 'block';
            document.getElementById('targetPlayerName').innerText = targetPid;
            document.getElementById('targetSlotNum').innerText = parseInt(targetSlot) + 1;
        }

        try {
            const response = await fetch('skills.json');
            allSkills = await response.json();
            loadFilters();
            updateSmallCatButtons();
            renderSkills();
        } catch (error) {
            document.getElementById('skillList').innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">skills.jsonが見つかりません。</div>';
        }
    }

    function toggleSection(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }

    function updateSmallCatButtons() {
        const container = document.getElementById('smallCatContainer');
        container.innerHTML = "";
        const selectedTypes = filters.type.length > 0 ? filters.type : Object.keys(categoryMap);
        selectedTypes.forEach(type => {
            if (!categoryMap[type]) return;
            const label = document.createElement('span');
            label.className = 'cat-group-label'; label.innerText = type;
            container.appendChild(label);
            categoryMap[type].forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn'; btn.dataset.type = 'smallCat'; btn.dataset.value = cat; btn.innerText = cat;
                btn.onclick = () => toggleFilter('smallCat', cat);
                if (filters.smallCat.includes(cat)) btn.classList.add('active');
                container.appendChild(btn);
            });
        });
    }

    function toggleFilter(type, value) {
        if (filters[type].includes(value)) filters[type] = filters[type].filter(v => v !== value);
        else filters[type].push(value);
        if (type === 'type') updateSmallCatButtons();
        updateFilterButtons(); saveFilters(); renderSkills();
    }

    function toggleOwnedFilter(mode) {
        showMode = mode; updateFilterButtons(); saveFilters(); renderSkills();
    }

    function updateFilterButtons() {
        document.querySelectorAll(".filter-btn[data-type]").forEach(btn => {
            const type = btn.dataset.type; const val = btn.dataset.value;
            btn.classList.toggle("active", filters[type].includes(val));
        });
        document.getElementById('showAll').classList.toggle('active', showMode === 'all');
        document.getElementById('showOwned').classList.toggle('active', showMode === 'owned');
    }

    function resetFilters() {
        filters = { rarity: [], type: [], smallCat: [], method: [] };
        showMode = 'all'; document.getElementById('nameSearch').value = "";
        updateSmallCatButtons(); updateFilterButtons(); saveFilters(); renderSkills();
    }

    function saveFilters() {
        localStorage.setItem('skillSearchFilters_v4', JSON.stringify({ filters, showMode, name: document.getElementById('nameSearch').value }));
    }

    function loadFilters() {
        const saved = JSON.parse(localStorage.getItem('skillSearchFilters_v4'));
        if (saved) {
            filters = saved.filters || filters;
            showMode = saved.showMode || 'all';
            document.getElementById('nameSearch').value = saved.name || "";
            updateFilterButtons();
        }
    }

    function renderSkills() {
        const list = document.getElementById('skillList');
        const nameQuery = document.getElementById('nameSearch').value.toLowerCase();
        const filtered = allSkills.filter(s => {
            const isOwned = mySkills.includes(s.name);
            const matchSearch = s.name.toLowerCase().includes(nameQuery) || (s.source && s.source.toLowerCase().includes(nameQuery)) || (s.detail && s.detail.toLowerCase().includes(nameQuery));
            const matchRarity = filters.rarity.length === 0 || filters.rarity.includes(s.rarity);
            const matchType = filters.type.length === 0 || filters.type.includes(s.type);
            const matchSmallCat = filters.smallCat.length === 0 || filters.smallCat.includes(s.smallCat);
            const matchOwned = showMode === 'all' || isOwned;
            let matchMethod = true;
            if (filters.method.length > 0) {
                const combinedText = (s.method || '') + ' ' + (s.source || '');
                matchMethod = filters.method.some(m => m === 'SR' ? /SR(?![S])/.test(combinedText) : combinedText.includes(m));
            }
            return matchSearch && matchRarity && matchType && matchSmallCat && matchMethod && matchOwned;
        });

        list.innerHTML = filtered.length ? '' : '<div style="text-align:center; padding:20px; color:#64748b;">条件に合うスキルがありません。</div>';

        filtered.forEach(s => {
            const isOwned = mySkills.includes(s.name);
            const div = document.createElement('div');
            div.className = 'skill-item';
            const skillData = encodeURIComponent(JSON.stringify(s));
            const assignBtnHtml = (targetPid && targetSlot !== null) ? `<button class="action-btn assign-btn" onclick="assignSkill('${s.name}')">付与</button>` : '';

            div.innerHTML = `
                <div class="skill-info">
                    <span class="skill-cat-small">${s.type} ＞ ${s.smallCat}</span>
                    <div class="skill-name" onclick="openModal('${skillData}')">
                        <span class="rarity-${s.rarity}">[${s.rarity}]</span> ${s.name}
                        ${isOwned ? '<span class="owned-badge">所持</span>' : ''}
                    </div>
                    <div class="source-info-simple">
                        <span class="method-badge">${s.method || '不明'}</span>
                        習得元: ${s.source || '-'}
                    </div>
                </div>
                <div class="btn-group">
                    <button class="action-btn detail-btn" onclick="openModal('${skillData}')">詳細</button>
                    ${assignBtnHtml}
                    <button class="action-btn ${isOwned ? 'is-owned' : ''}" onclick="toggleOwn('${s.name}')">
                        ${isOwned ? '✓ 所持済' : '手持登録'}
                    </button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function openModal(encodedData) {
        const s = JSON.parse(decodeURIComponent(encodedData));
        document.getElementById('modalSkillName').innerText = s.name;
        document.getElementById('modalRarity').innerText = s.rarity;
        document.getElementById('modalCategory').innerText = `${s.type} / ${s.smallCat}`;
        document.getElementById('modalMethod').innerText = s.method || '-';
        document.getElementById('modalSource').innerText = s.source || '-';
        document.getElementById('modalDetail').innerText = s.detail || '効果詳細情報なし';
        document.getElementById('skillDetailModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('skillDetailModal').style.display = 'none'; }
    window.onclick = (e) => { if (e.target == document.getElementById('skillDetailModal')) closeModal(); }

    function assignSkill(skillName) {
        if (!targetPid || targetSlot === null) return;
        let equipped = JSON.parse(localStorage.getItem('equippedSkills')) || {};
        if (!equipped[targetPid]) equipped[targetPid] = [null, null, null, null];
        equipped[targetPid][targetSlot] = skillName;
        localStorage.setItem('equippedSkills', JSON.stringify(equipped));
        location.href = `${fromBuilder ? 'builder.html' : 'search.html'}?pid=${encodeURIComponent(targetPid)}`; 
    }

    function cancelAssign() { location.href = `${fromBuilder ? 'builder.html' : 'search.html'}?pid=${encodeURIComponent(targetPid)}`; }

    function toggleOwn(skillName) {
        const index = mySkills.indexOf(skillName);
        if (index > -1) mySkills.splice(index, 1);
        else mySkills.push(skillName);
        localStorage.setItem('mySkills', JSON.stringify(mySkills));
        renderSkills();
    }

    init();
</script>
</body>
</html>
