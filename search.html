<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>プリスキンのサカつくDB - 選手検索</title>
    <style>
        :root {
            --sakatsuku-navy: #050a14;
            --sakatsuku-mint: #00ffcc;
            --sakatsuku-cyan: #4fc3f7;
            --sakatsuku-dark-green: #0a1f1a;
            --primary: var(--sakatsuku-mint);
            --dark: var(--sakatsuku-navy);
            --page-bg: radial-gradient(circle at 50% -20%, #1a3a35 0%, #050a14 70%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --nav-height: 60px;
            --border: rgba(0, 255, 204, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--sakatsuku-navy);
            background-image: var(--page-bg);
            background-attachment: fixed;
            font-family: 'Inter', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            color: #fff; line-height: 1.6;
        }

        /* ===== ナビゲーション ===== */
        .topnav {
            display: flex; justify-content: flex-start; align-items: center;
            background: rgba(5, 10, 20, 0.85); backdrop-filter: blur(15px);
            height: var(--nav-height); padding: 0 15px; position: sticky; top: 0; z-index: 1000;
            border-bottom: 2px solid var(--sakatsuku-mint); padding-top: env(safe-area-inset-top);
        }
        .nav-links { display: flex; overflow-x: auto; white-space: nowrap; gap: 6px; width: 100%; }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-links a {
            color: rgba(255, 255, 255, 0.7); text-decoration: none; padding: 8px 14px; 
            font-size: 0.85rem; font-weight: 800; border-radius: 8px; transition: 0.3s;
        }
        .nav-links a:hover { color: var(--sakatsuku-mint); }
        .nav-links a.current { background: var(--sakatsuku-mint); color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }

        /* ===== レイアウト ===== */
        .container { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 120px); }

        /* ===== サイドバー ===== */
        .sidebar { 
            width: 320px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 20px; border-right: 1px solid var(--border); 
            overflow-y: auto; height: calc(100vh - 60px); position: sticky; top: 60px; 
        }
        .sidebar h3 { font-size: 1.1rem; margin-top: 0; color: var(--sakatsuku-mint); border-left: 4px solid var(--sakatsuku-mint); padding-left: 10px; margin-bottom: 20px; }

        #nameSearch { 
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; 
            margin-bottom: 20px; font-size: 0.9rem; background: rgba(255,255,255,0.1); color: #fff; outline: none;
        }

        .filter-section { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: rgba(255,255,255,0.03); }
        .filter-title { font-size: 0.85rem; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.05); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; color: var(--sakatsuku-cyan); }
        .filter-options { display: none; padding: 10px; max-height: 450px; overflow-y: auto; }

        .style-group-label { display: block; font-size: 0.7rem; color: var(--sakatsuku-mint); font-weight: bold; margin: 12px 0 6px 4px; border-bottom: 1px solid var(--border); padding-bottom: 2px; }

        .filter-btn { padding: 6px 10px; margin: 2px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; font-size: 0.75rem; border-radius: 6px; transition: 0.2s; }
        .filter-btn.active { background: var(--sakatsuku-mint); color: #000; border-color: var(--sakatsuku-mint); font-weight: bold; }

        /* 選手追加フォーム */
        .create-form-section { background: rgba(0, 255, 204, 0.05); border: 1px solid var(--sakatsuku-mint); margin-bottom: 40px; border-radius: 12px; overflow: hidden; }
        .create-form-title { font-size: 0.85rem; font-weight: bold; cursor: pointer; background: rgba(0, 255, 204, 0.1); padding: 10px 15px; color: var(--sakatsuku-mint); display: flex; justify-content: space-between; align-items: center; }
        .create-form-content { display: none; padding: 15px; }
        .create-form-content label { display: block; font-size: 0.7rem; color: var(--sakatsuku-cyan); margin-top: 5px; }
        .create-form-content input, .create-form-content select { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: #fff; font-size: 0.8rem; }
        .submit-btn { width: 100%; padding: 12px; background: var(--sakatsuku-mint); color: #000; border: none; cursor: pointer; font-weight: 900; border-radius: 8px; font-size: 0.85rem; margin-top: 10px; }

        /* ===== メインコンテンツ ===== */
        .main { flex: 1; padding: 20px; }
        .main h1 { font-size: 1.8rem; margin-top: 0; color: #fff; text-shadow: 0 0 15px rgba(0,255,204,0.3); font-weight: 900; }
        
        .table-wrapper { 
            background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 20px; 
            border: 1px solid var(--border); overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        table { border-collapse: collapse; width: 100%; }
        th { background: rgba(255,255,255,0.05); padding: 15px 10px; border-bottom: 2px solid var(--border); text-align: left; font-size: 0.75rem; color: var(--sakatsuku-cyan); font-weight: 900; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; color: #eee; }

        .policy-badge { padding: 4px 8px; border-radius: 4px; color: white; font-size: 0.65rem; font-weight: bold; white-space: nowrap; }
        .policy-possession { background: #f59e0b; }
        .policy-counter { background: #ef4444; }
        .policy-reaction { background: #3b82f6; }
        .policy-moving { background: #10b981; }

        .action-btn { padding: 6px 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-size: 0.7rem; background: rgba(255,255,255,0.05); color: #fff; font-weight: 700; transition: 0.2s; }
        .action-btn.owned { background: #fef3c7; border-color: #fbbf24; color: #92400e; }
        .action-btn.detail-btn { background: var(--sakatsuku-mint); color: #000; border: none; }
        .delete-btn { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; margin-top: 4px; }
        
        .name-link { color: var(--sakatsuku-mint); font-weight: 900; cursor: pointer; text-decoration: none; }

        /* ===== モーダル ===== */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--sakatsuku-navy); border: 2px solid var(--sakatsuku-mint); width: 100%; max-width: 400px; border-radius: 24px; overflow: hidden; animation: slideUp 0.3s ease-out; }
        .modal-header { background: #1a3a35; color: var(--sakatsuku-mint); padding: 20px; text-align: center; }
        .modal-header h2 { margin: 0; font-size: 1.3rem; font-weight: 900; }
        .modal-body { padding: 20px; max-height: 80vh; overflow-y: auto; }
        .modal-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-label { font-weight: bold; color: var(--sakatsuku-cyan); font-size: 0.85rem; }
        .modal-val { font-weight: 600; color: #fff; }

        .skill-section { margin-top: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
        .skill-section h3 { font-size: 0.9rem; margin: 0 0 10px 0; color: var(--sakatsuku-mint); font-weight: 900; }
        .slot { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; }
        .slot-name { font-weight: bold; cursor: pointer; color: var(--sakatsuku-mint); text-decoration: underline; }
        .btn-remove { background: #ef4444; color: white; border: none; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
        .btn-add { background: var(--sakatsuku-mint); color: #000; border: none; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-weight: 900; }

        .skill-detail-box { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.8rem; color: #ccc; border-left: 4px solid var(--sakatsuku-mint); }
        .close-btn { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        footer { text-align: center; padding: 60px 20px; background: rgba(5, 10, 20, 0.95); color: #777; border-top: 1px solid var(--border); margin-top: 40px; }
        .footer-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; font-size: 0.85rem; margin-bottom: 25px; }
        .footer-nav a { color: var(--sakatsuku-cyan); text-decoration: none; font-weight: 700; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 900px) { 
            .container { flex-direction: column; } 
            .sidebar { width: 100%; border-right: none; height: auto; position: relative; top: 0; }
            .desktop-only { display: none; }
        }
    </style>
</head>
<body>

    <header class="topnav">
        <nav class="nav-links">
            <a href="index.html">ホーム</a>
            <a href="builder.html">スカッド</a>
            <a href="search.html" class="current">選手</a>
            <a href="formation-search.html">フォメコン</a>
            <a href="skills.html">スキル</a>
        </nav>
    </header>

    <div class="container">
        <div class="sidebar">
            <h3>選手絞り込み</h3>
            <input type="text" id="nameSearch" placeholder="選手名で検索..." oninput="saveFilters();search()">
            
            <div class="filter-section">
                <div class="filter-title">表示設定</div>
                <div style="padding:10px;">
                    <button id="showAll" class="filter-btn active" onclick="toggleShow('all')">全表示</button>
                    <button id="showOwned" class="filter-btn" onclick="toggleShow('owned')">手持ちのみ</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title" onclick="toggleSection('raritySection')">レアリティ <span>▼</span></div>
                <div id="raritySection" class="filter-options">
                    <button class="filter-btn" data-type="rarity" data-value="☆3" onclick="toggleFilter('rarity','☆3')">☆3</button>
                    <button class="filter-btn" data-type="rarity" data-value="☆2" onclick="toggleFilter('rarity','☆2')">☆2</button>
                    <button class="filter-btn" data-type="rarity" data-value="☆1" onclick="toggleFilter('rarity','☆1')">☆1</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title" onclick="toggleSection('methodSection')">入手法 <span>▼</span></div>
                <div id="methodSection" class="filter-options">
                    <button class="filter-btn" data-type="method" data-value="ワールドSP" onclick="toggleFilter('method','ワールドSP')">ワールドSP</button>
                    <button class="filter-btn" data-type="method" data-value="JリーグSP" onclick="toggleFilter('method','JリーグSP')">JリーグSP</button>
                    <button class="filter-btn" data-type="method" data-value="KリーグSP" onclick="toggleFilter('method','KリーグSP')">KリーグSP</button>
                    <button class="filter-btn" data-type="method" data-value="配布・限定SP" onclick="toggleFilter('method','配布・限定SP')">配布・限定SP</button>
                    <button class="filter-btn" data-type="method" data-value="モード内" onclick="toggleFilter('method','モード内')">モード内</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title" onclick="toggleSection('policySection')">ポリシー <span>▼</span></div>
                <div id="policySection" class="filter-options">
                    <button class="filter-btn" data-type="policy" data-value="ポゼッション" onclick="toggleFilter('policy','ポゼッション')">ポゼッション</button>
                    <button class="filter-btn" data-type="policy" data-value="カウンター" onclick="toggleFilter('policy','カウンター')">カウンター</button>
                    <button class="filter-btn" data-type="policy" data-value="リアクション" onclick="toggleFilter('policy','リアクション')">リアクション</button>
                    <button class="filter-btn" data-type="policy" data-value="ムービング" onclick="toggleFilter('policy','ムービング')">ムービング</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title" onclick="toggleSection('positionSection')">ポジション <span>▼</span></div>
                <div id="positionSection" class="filter-options">
                    <button class="filter-btn" data-type="position" data-value="GK" onclick="toggleFilter('position','GK')">GK</button>
                    <button class="filter-btn" data-type="position" data-value="CB" onclick="toggleFilter('position','CB')">CB</button>
                    <button class="filter-btn" data-type="position" data-value="LB" onclick="toggleFilter('position','LB')">LB</button>
                    <button class="filter-btn" data-type="position" data-value="RB" onclick="toggleFilter('position','RB')">RB</button>
                    <button class="filter-btn" data-type="position" data-value="DM" onclick="toggleFilter('position','DM')">DM</button>
                    <button class="filter-btn" data-type="position" data-value="LM" onclick="toggleFilter('position','LM')">LM</button>
                    <button class="filter-btn" data-type="position" data-value="RM" onclick="toggleFilter('position','RM')">RM</button>
                    <button class="filter-btn" data-type="position" data-value="AM" onclick="toggleFilter('position','AM')">AM</button>
                    <button class="filter-btn" data-type="position" data-value="LW" onclick="toggleFilter('position','LW')">LW</button>
                    <button class="filter-btn" data-type="position" data-value="RW" onclick="toggleFilter('position','RW')">RW</button>
                    <button class="filter-btn" data-type="position" data-value="CF" onclick="toggleFilter('position','CF')">CF</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-title" onclick="toggleSection('styleSection')">プレースタイル <span>▼</span></div>
                <div id="styleSection" class="filter-options">
                    <span class="style-group-label">FW</span>
                    <button class="filter-btn" data-type="style" data-value="ストライカーⅢ" onclick="toggleFilter('style','ストライカーⅢ')">ストライカーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="ストライカーⅡ" onclick="toggleFilter('style','ストライカーⅡ')">ストライカーⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="ラインブレーカーⅢ" onclick="toggleFilter('style','ラインブレーカーⅢ')">ラインブレーカーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="ラインブレーカーⅡ" onclick="toggleFilter('style','ラインブレーカーⅡ')">ラインブレーカーⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="ポストプレーヤーⅢ" onclick="toggleFilter('style','ポストプレーヤーⅢ')">ポストプレーヤーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="ポストプレーヤーⅡ" onclick="toggleFilter('style','ポストプレーヤーⅡ')">ポストプレーヤーⅡ</button>
                    
                    <span class="style-group-label">FW・MF共通</span>
                    <button class="filter-btn" data-type="style" data-value="ドリブラーⅢ" onclick="toggleFilter('style','ドリブラーⅢ')">ドリブラーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="ドリブラーⅡ" onclick="toggleFilter('style','ドリブラーⅡ')">ドリブラーⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="サイドアタッカーⅢ" onclick="toggleFilter('style','サイドアタッカーⅢ')">サイドアタッカーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="サイドアタッカーⅡ" onclick="toggleFilter('style','サイドアタッカーⅡ')">サイドアタッカーⅡ</button>

                    <span class="style-group-label">MF</span>
                    <button class="filter-btn" data-type="style" data-value="アタッカーⅢ" onclick="toggleFilter('style','アタッカーⅢ')">アタッカーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="アタッカーⅡ" onclick="toggleFilter('style','アタッカーⅡ')">アタッカーⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="セントラルMFⅢ" onclick="toggleFilter('style','セントラルMFⅢ')">セントラルMFⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="セントラルMFⅡ" onclick="toggleFilter('style','セントラルMFⅡ')">セントラルMFⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="パサーⅢ" onclick="toggleFilter('style','パサーⅢ')">パサーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="パサーⅡ" onclick="toggleFilter('style','パサーⅡ')">パサーⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="ハードマーカーⅢ" onclick="toggleFilter('style','ハードマーカーⅢ')">ハードマーカーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="ハードマーカーⅡ" onclick="toggleFilter('style','ハードマーカーⅡ')">ハードマーカーⅡ</button>

                    <span class="style-group-label">DF</span>
                    <button class="filter-btn" data-type="style" data-value="攻撃的FBⅢ" onclick="toggleFilter('style','攻撃的FBⅢ')">攻撃的FBⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="攻撃的FBⅡ" onclick="toggleFilter('style','攻撃的FBⅡ')">攻撃的FBⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="守備的FBⅢ" onclick="toggleFilter('style','守備的FBⅢ')">守備的FBⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="守備的FBⅡ" onclick="toggleFilter('style','守備的FBⅡ')">守備的FBⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="組立CBⅢ" onclick="toggleFilter('style','組立CBⅢ')">組立CBⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="組立CBⅡ" onclick="toggleFilter('style','組立CBⅡ')">組立CBⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="ストッパーⅢ" onclick="toggleFilter('style','ストッパーⅢ')">ストッパーⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="ストッパーⅡ" onclick="toggleFilter('style','ストッパーⅡ')">ストッパーⅡ</button>

                    <span class="style-group-label">GK</span>
                    <button class="filter-btn" data-type="style" data-value="スイーパーGKⅢ" onclick="toggleFilter('style','スイーパーGKⅢ')">スイーパーGKⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="スイーパーGKⅡ" onclick="toggleFilter('style','スイーパーGKⅡ')">スイーパーGKⅡ</button>
                    <button class="filter-btn" data-type="style" data-value="オーソドックスGKⅢ" onclick="toggleFilter('style','オーソドックスGKⅢ')">オーソドックスGKⅢ</button>
                    <button class="filter-btn" data-type="style" data-value="オーソドックスGKⅡ" onclick="toggleFilter('style','オーソドックスGKⅡ')">オーソドックスGKⅡ</button>
                </div>
            </div>

            <div class="create-form-section">
                <div class="create-form-title" onclick="toggleSection('createFormContent')">＋ 選手を手動で追加 <span>▼</span></div>
                <div id="createFormContent" class="create-form-content">
                    <label>選手名</label>
                    <input type="text" id="newName" placeholder="例：エムバペ">
                    <label>レアリティ</label>
                    <select id="newRarity"><option value="☆3">☆3</option><option value="☆2">☆2</option><option value="☆1">☆1</option></select>
                    <label>入手法</label>
                    <select id="newMethod">
                        <option value="ワールドSP">ワールドSP</option><option value="JリーグSP">JリーグSP</option>
                        <option value="KリーグSP">KリーグSP</option><option value="配布SP">配布SP</option><option value="モード内">モード内</option>
                    </select>
                    <label>ポジション</label>
                    <select id="newPos">
                        <option value="CF">CF</option><option value="RW">RW</option><option value="LW">LW</option>
                        <option value="AM">AM</option><option value="RM">RM</option><option value="LM">LM</option>
                        <option value="DM">DM</option><option value="RB">RB</option><option value="LB">LB</option>
                        <option value="CB">CB</option><option value="GK">GK</option>
                    </select>
                    <label>ポリシー</label>
                    <select id="newPolicy">
                        <option value="ポゼッション">ポゼッション</option><option value="カウンター">カウンター</option>
                        <option value="リアクション">リアクション</option><option value="ムービング">ムービング</option>
                    </select>
                    <label>プレースタイル</label>
                    <select id="newStyle">
                        <option value="ストライカーⅢ">ストライカーⅢ</option>
                        <option value="ドリブラーⅢ">ドリブラーⅢ</option>
                        <option value="組立CBⅢ">組立CBⅢ</option>
                        </select>
                    <button class="submit-btn" onclick="addPlayer()">リストに保存</button>
                </div>
            </div>
        </div>

        <div class="main">
            <h1>選手データベース</h1>
            <div class="table-wrapper">
                <table id="playerTable">
                    <thead>
                        <tr>
                            <th>名前</th>
                            <th class="desktop-only">レア</th>
                            <th class="desktop-only">入手法</th>
                            <th>ポジ</th>
                            <th>ポリシー</th>
                            <th class="desktop-only">スタイル</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="results"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalName">選手名</h2></div>
            <div class="modal-body">
                <div class="modal-row"><span class="modal-label">レアリティ</span><span id="modalRarity" class="modal-val"></span></div>
                <div class="modal-row"><span class="modal-label">入手法</span><span id="modalMethod" class="modal-val"></span></div>
                <div class="modal-row"><span class="modal-label">メインポジ</span><span id="modalPos" class="modal-val"></span></div>
                <div class="modal-row"><span class="modal-label">ポリシー</span><span id="modalPolicy" class="modal-val"></span></div>
                <div class="modal-row"><span class="modal-label">プレースタイル</span><span id="modalStyle" class="modal-val"></span></div>
                <div class="skill-section">
                    <h3>追加スキル</h3>
                    <div id="modalSlots" class="slot-list"></div>
                </div>
            </div>
            <div class="modal-footer" style="padding:15px;"><button class="close-btn" onclick="closeModal()">閉じる</button></div>
        </div>
    </div>

    <div id="skillSubModal" class="modal" style="z-index: 3000;">
        <div class="modal-content">
            <div class="modal-header" style="background:#050a14;"><h2 id="subModalSkillName">スキル詳細</h2></div>
            <div class="modal-body">
                <div class="modal-row"><span class="modal-label">習得元</span><span id="subModalSource" class="modal-val"></span></div>
                <div id="subModalDetail" class="skill-detail-box"></div>
                <button class="close-btn" style="margin-top:20px;" onclick="closeSubModal()">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let jsonPlayers = [];
        let allSkills = [];
        let createdPlayers = JSON.parse(localStorage.getItem('createdPlayers') || '[]');
        let ownedPlayers = JSON.parse(localStorage.getItem('ownedPlayers') || '[]');
        let showMode = 'all'; 
        let filters = { rarity: [], policy: [], position: [], method: [], style: [] };

        async function init() {
            loadFilters();
            try {
                const skillRes = await fetch('skills.json');
                if (skillRes.ok) allSkills = await skillRes.json();
            } catch (e) {}

            const jsonFiles = ['players_world.json', 'players_distribution.json', 'players_jleague.json', 'players_kleague.json', 'players_in_mode.json'];
            try {
                const results = await Promise.all(jsonFiles.map(file => fetch(file).then(res => res.ok ? res.json() : []).catch(() => [])));
                jsonPlayers = results.flat();
            } catch (e) {}
            
            updateButtons();
            search();
        }

        function getInitialSlots(player) {
            const r = player.rarity;
            const m = player.method || "";
            let slotsCount = 1;
            const isStandardSP = (m === "ワールドSP" || m === "JリーグSP" || m === "KリーグSP" || m === "限定SP");
            if (isStandardSP && r === "☆3") slotsCount = 4;
            else if (isStandardSP && r === "☆2") slotsCount = 3;
            else if ((m === "配布SP" || m === "モード内") && r === "☆3") slotsCount = 3;
            let slots = new Array(slotsCount).fill(null);
            if (player.extra_skills && player.extra_skills.length > 0) slots[0] = player.extra_skills[0];
            return slots;
        }

        function search() {
            const nameInput = document.getElementById("nameSearch").value.toLowerCase();
            const all = jsonPlayers.concat(createdPlayers);
            const filtered = all.filter(p => {
                if (nameInput && !p.name.toLowerCase().includes(nameInput)) return false;
                if (filters.rarity.length && !filters.rarity.includes(p.rarity)) return false;
                if (filters.policy.length && !filters.policy.includes(p.policy)) return false;
                if (filters.position.length && !filters.position.includes(p.position)) return false;
                if (filters.style.length && !filters.style.includes(p.playstyle)) return false;
                if (filters.method.length) {
                    const isMatch = filters.method.some(fv => (fv === "配布・限定SP") ? (p.method === "配布SP" || p.method === "限定SP") : p.method === fv);
                    if (!isMatch) return false;
                }
                if (showMode === 'owned' && !ownedPlayers.includes(p.name)) return false;
                return true;
            });
            render(filtered);
        }

        function render(list) {
            let html = "";
            list.forEach(p => {
                const pClass = { "ポゼッション": "policy-possession", "カウンター": "policy-counter", "リアクション": "policy-reaction", "ムービング": "policy-moving" }[p.policy] || "";
                const isOwned = ownedPlayers.includes(p.name);
                const playerData = encodeURIComponent(JSON.stringify(p));
                html += `<tr>
                    <td><a class="name-link" onclick="sendToBuilder('${playerData}')">${p.name}</a></td>
                    <td class="desktop-only">${p.rarity}</td>
                    <td class="desktop-only" style="color:var(--sakatsuku-cyan); font-size:0.7rem;">${p.method || '-'}</td>
                    <td><b>${p.position}</b></td>
                    <td><span class="policy-badge ${pClass}">${p.policy}</span></td>
                    <td class="desktop-only">${p.playstyle || '-'}</td>
                    <td>
                        <div style="display:flex; flex-direction:column; gap:4px;">
                            <button class="action-btn detail-btn" onclick="openModal('${playerData}')">詳細</button>
                            <button class="action-btn ${isOwned ? 'owned' : ''}" onclick="toggleOwned('${p.name}')">${isOwned ? '解除' : '手持'}</button>
                            ${p.isCustom ? `<button class="action-btn delete-btn" onclick="deletePlayer('${p.name}')">削除</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            });
            document.getElementById("results").innerHTML = html;
        }

        function openModal(encodedData) {
            const p = JSON.parse(decodeURIComponent(encodedData));
            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalRarity').innerText = p.rarity;
            document.getElementById('modalMethod').innerText = p.method || '-';
            document.getElementById('modalPos').innerText = p.position;
            document.getElementById('modalPolicy').innerText = p.policy;
            document.getElementById('modalStyle').innerText = p.playstyle || '-';
            renderSlots(p);
            document.getElementById('detailModal').style.display = 'flex';
        }

        function renderSlots(player) {
            const equipped = JSON.parse(localStorage.getItem('equippedSkills')) || {};
            const slots = equipped[player.name] || getInitialSlots(player);
            let html = "";
            slots.forEach((skillName, index) => {
                if (skillName) {
                    html += `<div class="slot"><span class="slot-name" onclick="openSkillSubModal('${skillName}')">${skillName}</span><button class="btn-remove" onclick="removeSkill('${player.name}', ${index}, '${encodeURIComponent(JSON.stringify(player))}')">解除</button></div>`;
                } else {
                    html += `<div class="slot"><span>未設定</span><button class="btn-add" onclick="goToSkillSelect('${player.name}', ${index})">＋</button></div>`;
                }
            });
            document.getElementById('modalSlots').innerHTML = html;
        }

        function openSkillSubModal(skillName) {
            const skill = allSkills.find(s => s.name === skillName);
            document.getElementById('subModalSkillName').innerText = skillName;
            document.getElementById('subModalSource').innerText = skill ? skill.source : '-';
            document.getElementById('subModalDetail').innerText = skill ? skill.detail : '情報なし';
            document.getElementById('skillSubModal').style.display = 'flex';
        }

        function removeSkill(playerName, index, encodedPlayer) {
            let equipped = JSON.parse(localStorage.getItem('equippedSkills')) || {};
            if (equipped[playerName]) {
                equipped[playerName][index] = null;
                localStorage.setItem('equippedSkills', JSON.stringify(equipped));
                renderSlots(JSON.parse(decodeURIComponent(encodedPlayer)));
            }
        }

        function toggleOwned(name) {
            if (ownedPlayers.includes(name)) ownedPlayers = ownedPlayers.filter(n => n !== name);
            else ownedPlayers.push(name);
            localStorage.setItem('ownedPlayers', JSON.stringify(ownedPlayers));
            search();
        }

        function addPlayer() {
            const name = document.getElementById('newName').value;
            if (!name) return alert("選手名を入力してください");
            const newP = {
                name: name, rarity: document.getElementById('newRarity').value,
                method: document.getElementById('newMethod').value, position: document.getElementById('newPos').value,
                policy: document.getElementById('newPolicy').value, playstyle: document.getElementById('newStyle').value,
                isCustom: true, extra_skills: []
            };
            createdPlayers.push(newP);
            localStorage.setItem('createdPlayers', JSON.stringify(createdPlayers));
            document.getElementById('newName').value = ""; search();
            alert(name + " を保存しました。");
        }

        function deletePlayer(name) {
            if (!confirm(name + " を削除しますか？")) return;
            createdPlayers = createdPlayers.filter(p => p.name !== name);
            localStorage.setItem('createdPlayers', JSON.stringify(createdPlayers));
            search();
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }

        function toggleFilter(type, value) {
            if (filters[type].includes(value)) filters[type] = filters[type].filter(v => v !== value);
            else filters[type].push(value);
            updateButtons(); saveFilters(); search();
        }

        function toggleShow(mode) { showMode = mode; updateButtons(); saveFilters(); search(); }
        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
        function closeSubModal() { document.getElementById('skillSubModal').style.display = 'none'; }
        function goToSkillSelect(playerName, index) { location.href = `skills.html?pid=${encodeURIComponent(playerName)}&slot=${index}`; }

        function updateButtons() {
            document.querySelectorAll(".filter-btn[data-type]").forEach(btn => {
                btn.classList.toggle("active", (filters[btn.dataset.type] || []).includes(btn.dataset.value));
            });
            document.getElementById('showAll').classList.toggle('active', showMode === 'all');
            document.getElementById('showOwned').classList.toggle('active', showMode === 'owned');
        }

        function saveFilters() {
            localStorage.setItem("searchFilters_v12", JSON.stringify({ filters, showMode, name: document.getElementById("nameSearch").value }));
        }

        function loadFilters() {
            const saved = JSON.parse(localStorage.getItem("searchFilters_v12"));
            if (saved) {
                filters = saved.filters || filters;
                showMode = saved.showMode || 'all';
                document.getElementById("nameSearch").value = saved.name || "";
            }
        }

        function sendToBuilder(encodedData) {
            localStorage.setItem('selectedPlayer', decodeURIComponent(encodedData));
            location.href = 'builder.html';
        }

        init();
    </script>
</body>
</html>
